services:
  openclaw:
    build: .
    restart: unless-stopped
    init: true
    ports:
      - "18790:18790"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - openclaw-data:/home/node/.openclaw
    env_file:
      - .env
    environment:
      HOME: /home/node
      TERM: xterm-256color
      TZ: Asia/Taipei
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18790/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  openclaw-data:
